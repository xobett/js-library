<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <script type="module" src="./js/index.js" defer></script>
</head>
<body>
    <div class="grid-container">
        <div class="header">
            <h2>JS LIBRARY</h2>
        </div>
        <div class="content">
            <div class="add-container">
                <div id="show-modal-btn" class="btn">Add book</div>
            </div>
            <div>
            </div>
        </div>
        <div class="footer"></div>
    </div>
    
    <dialog id="modal" >
        <form>
            <div class="field-container">
                <input type="text" id="author" name="author" placeholder="" required>
                <label for="author">Author</label>
            </div>
            <div class="field-container">
                <input type="text" id="title" name="title" placeholder="" required>
                <label for="title">Title</label>
            </div>
            <div class="field-container">
                <input type="number" min="1" id="pages" name="pages" placeholder="" required>
                <label for="pages">Pages</label>
            </div>
            <div class="field-container">
                <label for="isRead">Is read</label>
                <input type="checkbox" id="isRead" name="isRead" required>
            </div>
        </form>
    <div id="close-modal-btn" class="btn">Close</div>
    </dialog>
</body>
</html>
