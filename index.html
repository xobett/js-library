<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <script type="module" src="./js/index.js" defer></script>
</head>
<body>
    <div class="grid-container">
        <div class="header">
            <h2>JS LIBRARY</h2>
        </div>
        <div class="content">
            <div class="add-container">
                <div id="show-modal-btn" class="btn">Add book</div>
            </div>
            <div class="library-container">
                
            </div>
        </div>
    </div>
    
    <dialog id="modal" closedby="any">
        <form id="form">
            <div class="field-container">
                <input type="text" id="author" name="author" placeholder="" required>
                <label for="author">Author</label>
            </div>
            <div class="field-container">
                <input type="text" id="title" name="title" placeholder="" required>
                <label for="title">Title</label>
            </div>
            <div class="field-container">
                <input type="number" min="1" id="pages" name="pages" placeholder="" required>
                <label for="pages">Pages</label>
            </div>
            <div class="field-container">
                <label for="isRead"><b>Have you read this book?</b></label>
                <input type="checkbox" id="isRead" name="isRead">
            </div>
        </form>
    <div class="btns-container">
        <div id="close-modal-btn" class="btn">Close</div>
        <button class="btn" form="form" type="submit">Submit</button>
    </div>
    </dialog>
    <dialog id="message-modal" closedby="none">
        <div class="result">Result</div>
        <div class="message">Message</div>
    </dialog>

    <template id="book-template">
        <div class="book">
            <div class="info-container">
                <div class="title">Title</div>
            </div>
            <div class="description-container">
                <div class="author">Written by:</div>
                <div class="pages">### pages</div>
            </div>
            <div class="actions-container">
                <div class="is-read">
                    <label for="is-read">Read</label>
                    <input id="is-read" type="checkbox" name="is-read">
                </div>
                <div class="btn btn-danger">
                    Delete
                </div>
            </div>
        </div>
    </template>
</body>
</html>
